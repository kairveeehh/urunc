<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>urunc CI Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f8; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; font-size: 24px; }
        
        .meta-box { background: #eef2f6; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .meta-box div { font-size: 14px; }
        .commit-msg { font-weight: bold; color: #0366d6; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { color: #586069; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Pills for status */
        .pill { display: inline-block; width: 35px; height: 10px; border-radius: 5px; margin-right: 4px; cursor: pointer; transition: opacity 0.2s; }
        .pill:hover { opacity: 0.7; }
        .pass { background-color: #2ea44f; }
        .fail { background-color: #cb2431; }
        .skipped { background-color: #dbedff; }

        .job-name { font-weight: 600; color: #0366d6; }
        .rate-high { color: #2ea44f; font-weight: bold; }
        .rate-med { color: #d29922; font-weight: bold; }
        .rate-low { color: #cb2431; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Workflow Dashboard</h1>
    
    <div class="meta-box">
        <div>
            Latest Merged PR: <span id="commit-sha" class="commit-msg">Loading...</span><br>
            <small id="commit-date" style="color: #666"></small>
        </div>
        <div style="text-align: right;">
            Last Updated: <span id="last-updated">...</span>
        </div>
    </div>

    <table id="dashboard-table">
        <thead>
            <tr>
                <th>Job Name</th>
                <th>Pass Rate</th>
                <th>Last 10 Runs</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            // Update Header
            document.getElementById('commit-sha').textContent = `${data.latest_commit.sha} - ${data.latest_commit.message}`;
            document.getElementById('commit-date').textContent = data.latest_commit.date;
            document.getElementById('last-updated').textContent = data.generated_at;

            const tbody = document.querySelector('#dashboard-table tbody');
            
            // Convert Jobs object to array and sort
            const jobs = Object.entries(data.jobs).map(([name, stats]) => ({name, ...stats}));
            jobs.sort((a, b) => a.name.localeCompare(b.name));

            jobs.forEach(job => {
                const tr = document.createElement('tr');
                
                // Pass Rate Color
                let rateClass = 'rate-low';
                if (job.pass_rate >= 90) rateClass = 'rate-high';
                else if (job.pass_rate >= 50) rateClass = 'rate-med';

                // Build History Pills
                const historyHtml = job.history.map(run => 
                    `<a href="${run.link}" target="_blank" title="${run.status}" class="pill ${run.status}"></a>`
                ).join('');

                tr.innerHTML = `
                    <td class="job-name">${job.name}</td>
                    <td class="${rateClass}">${job.pass_rate.toFixed(0)}%</td>
                    <td>${historyHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(error => console.error('Error loading data:', error));
</script>

</body>
</html>
